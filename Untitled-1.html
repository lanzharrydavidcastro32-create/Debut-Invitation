<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lei Hayessa Turns 18 - You're Invited!</title>
    <style>
        /* General Page Styling */
        body {
            font-family: 'Georgia', serif;
            background-color: #fce4ec; /* Soft pink background */
            background-image: linear-gradient(to bottom, #fce4ec, #f8bbd0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Container for the Video */
        .invitation-container {
            max-width: 600px;
            width: 100%;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid #f48fb1;
        }

        /* Typography */
        h1 {
            color: #d81b60;
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            color: #880e4f;
            font-style: italic;
            margin-bottom: 25px;
        }

        /* Responsive Video Player */
        .video-wrapper {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        <h1>Dearest Gentle Reader,</h1>
        <p>You are cordially invited to celebrate Lei Hayessa's 18th Birthday.</p>
        
        <div class="video-wrapper">
            <video controls poster="">
                <source src="DEBUT INVITATION.mp4" type="video/mp4">
                Your browser does not support the video tag. Please update your browser.
            </video>
        </div>
    </div>

</body>
</html>
